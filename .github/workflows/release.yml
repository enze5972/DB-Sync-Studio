name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            artifact_name: release-linux
          - os: macos-15-intel
            platform: macos
            artifact_name: release-macos-x64
          - os: macos-14
            platform: macos
            artifact_name: release-macos-aarch64
          - os: windows-latest
            platform: windows
            artifact_name: release-windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app-ui/package-lock.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 file squashfs-tools

      - name: Install Maven
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          choco install maven --no-progress -y
          Add-Content -Path $env:GITHUB_PATH -Value "C:\\ProgramData\\chocolatey\\bin"
          $env:PATH = "C:\\ProgramData\\chocolatey\\bin;$env:PATH"
          mvn -version

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version 1.6.3

      - name: Install frontend dependencies
        run: npm --prefix app-ui ci

      - name: Build packaged artifacts
        run: node scripts/package.js ${{ matrix.platform }}

      - name: Upload Linux AppImage diagnostics
        if: failure() && matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage-debug
          path: |
            app-shell/src-tauri/target/release/bundle/appimage
            app-shell/src-tauri/target/release/bundle/appimage_deb
          if-no-files-found: warn

      - name: Upload packaged output
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.platform }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: dist/linux

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos-x64
          path: dist/macos-x64

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos-aarch64
          path: dist/macos-aarch64

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: dist/windows

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DB Sync Studio ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/linux/**/*.AppImage
            dist/linux/**/*.deb
            dist/linux/**/*.rpm
            dist/macos-x64/**/DB.Sync.Studio_*.dmg
            dist/macos-aarch64/**/DB.Sync.Studio_*.dmg
            dist/windows/**/DB.Sync.Studio_*_en-US.msi
            dist/windows/**/DB.Sync.Studio_*-setup.exe
